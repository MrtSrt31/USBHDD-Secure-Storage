name: Build Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # ← BUNU EKLEDİK

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact: USBHDD-Windows-x64.exe
            exe_path: dist/USBHDD.exe

          - os: macos-14
            arch: arm64
            artifact: USBHDD-macOS-arm64
            exe_path: dist/USBHDD

          - os: ubuntu-22.04
            arch: x64
            artifact: USBHDD-Linux-x64
            exe_path: dist/USBHDD

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}
    continue-on-error: ${{ matrix.allow_fail == true }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.arch }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libssl-dev libjpeg-dev zlib1g-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller USBHDD.spec --noconfirm --clean

      - name: Rename artifact
        shell: bash
        run: mv "${{ matrix.exe_path }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 30


  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "USBHDD Secure Storage ${{ github.ref_name }}"
          body: |
            ## USBHDD Secure Storage ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |---|---|
            | Windows (64-bit) | `USBHDD-Windows-x64.exe` |
            | macOS Apple Silicon (M1/M2/M3) | `USBHDD-macOS-arm64` |
            | Linux (64-bit) | `USBHDD-Linux-x64` |

            ### First run
            1. Download the file for your platform
            2. macOS/Linux: Run `chmod +x USBHDD-*`
            3. Run the program
            4. Browser opens at https://localhost:8143
            5. Accept the certificate warning
            6. Complete setup
          files: release-assets/**/*
          draft: false
          prerelease: false